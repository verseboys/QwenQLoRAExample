runtime:
  use_gpu: true
  min_pagefile_gb: 16

model:
  name_or_path: "Qwen/Qwen2.5-7B-Instruct"
  trust_remote_code: true

data:
  train_file: "data/my_preference_train.jsonl"
  valid_file: "data/my_preference_valid.jsonl"
  validation_split: 0.0
  max_seq_length: 512
  prompt_field: "instruction"
  input_field: "input"
  output_field: "output"
  system_field: null

lora:
  r: 64
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

bnb:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

training:
  output_dir: "outputs/qwen2.5-7b-qlora-run"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  logging_steps: 10
  eval_steps: 10
  save_steps: 200
  save_total_limit: 2
  fp16: false
  bf16: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  max_grad_norm: 0.3
  seed: 42
